<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  display: flex; justify-content: center; align-items: center;
  background: #111; overflow: hidden;
}
.frame {
  width: 405px; height: 720px;
  position: relative; overflow: hidden;
  border-radius: 2px;
}
.bg-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
}
/* dark overlay to make countdown readable */
.overlay-dark {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.05) 45%,
    rgba(5,8,25,0.72) 65%,
    rgba(5,8,25,0.90) 100%
  );
}
/* Countdown panel */
.cd-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 14px 18px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 10;
}
.cd-pre {
  font-family: 'Cinzel', serif; font-size: 8.5px;
  letter-spacing: 3px; color: rgba(212,175,55,0.9);
  text-transform: uppercase;
}
.cd-boxes {
  display: flex; justify-content: center; align-items: flex-end; gap: 6px;
}
.cd-box { display: flex; flex-direction: column; align-items: center; }
.cd-val {
  font-family: 'Cinzel', serif; font-weight: 700;
  background: rgba(10,14,40,0.75);
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 5px;
  padding: 6px 4px 4px;
  text-align: center; min-width: 62px;
  position: relative; overflow: hidden;
}
.cd-val::after {
  content: ''; position: absolute; left: 8%; right: 8%; top: 50%;
  height: 0.5px; background: rgba(212,175,55,0.2);
}
#days-val  { font-size: 42px; line-height: 1; min-width: 82px; color: #d4af37; }
.cd-val-sm { font-size: 26px; line-height: 1; color: #f0dfa0; }
.cd-lbl {
  font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 1.8px;
  color: rgba(212,175,55,0.65); text-transform: uppercase; margin-top: 3px;
}
.cd-sep {
  font-family: 'Cinzel', serif; font-size: 22px;
  color: rgba(212,175,55,0.5); line-height: 1; margin-bottom: 18px;
  animation: sepBlink 1s ease-in-out infinite;
}
@keyframes sepBlink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.cd-slogan {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 11px; color: rgba(245,230,176,0.8);
}
.cd-date {
  font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700;
  color: #d4af37; letter-spacing: 1px;
  text-shadow: 0 0 12px rgba(212,175,55,0.6);
}

/* Glowing top border on panel */
.cd-panel::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px; background: linear-gradient(to right, transparent, rgba(212,175,55,0.6), transparent);
}

/* Animated corner sparkle dots */
.sparkle {
  position: absolute; border-radius: 50%;
  background: #d4af37; pointer-events: none;
  animation: sparkleAnim var(--sd) ease-in-out infinite alternate;
}
@keyframes sparkleAnim {
  from { opacity: 0.2; transform: scale(0.6); }
  to   { opacity: 0.9; transform: scale(1.2); }
}
</style>
</head>

function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }
function update(){
  const diff = new Date('2026-08-07T00:00:00') - new Date();
  if(diff <= 0){ return; }
  const days  = Math.floor(diff/86400000);
  const hours = Math.floor((diff%86400000)/3600000);
  const mins  = Math.floor((diff%3600000)/60000);
  const secs  = Math.floor((diff%60000)/1000);
  document.getElementById('days-val').textContent  = pad(days);
  document.getElementById('hours-val').textContent = pad(hours);
  document.getElementById('mins-val').textContent  = pad(mins);
  document.getElementById('secs-val').textContent  = pad(secs);
}
update(); setInterval(update,1000);
